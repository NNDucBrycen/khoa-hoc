spring.application.name=demo

# Datasource (values injected via environment variables; defaults for local dev)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:demo}
spring.datasource.username=${DB_USER:demo}
spring.datasource.password=${DB_PASSWORD:demo}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway base locations (seed directory added per profile)
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Session cookie base settings (SameSite and HttpOnly apply to all environments)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.path=/
