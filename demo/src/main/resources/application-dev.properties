# Dev profile: session 8h, Secure=false, Springdoc on, seed migration included
server.servlet.session.timeout=8h
# NOTE: SameSite=None requires Secure=true in production.
# Secure=false is intentional for local HTTP dev, but Chrome 80+ may block
# SameSite=None cookies on non-HTTPS origins. Use Firefox for local testing
# if cross-site cookie issues arise, or configure a local HTTPS proxy.
server.servlet.session.cookie.secure=false

spring.flyway.locations=classpath:db/migration,classpath:db/migration/seed

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
